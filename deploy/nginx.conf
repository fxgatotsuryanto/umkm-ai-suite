# ============================================================
# Nginx config untuk panel.aimarketingstrategic.com
# Salin ke: /etc/nginx/sites-available/panel.aimarketingstrategic.com
# Aktifkan: ln -s /etc/nginx/sites-available/panel.aimarketingstrategic.com /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    server_name panel.aimarketingstrategic.com;

    # Certbot akan mengisi bagian SSL otomatis setelah: certbot --nginx
    # (Jangan edit manual, biarkan certbot yang handle)

    # ── Admin HTML Panel (/panel) ────────────────────────────
    location = /panel {
        proxy_pass         http://127.0.0.1:9000/panel;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Cloud Admin API (/admin/ dan /packages) ──────────────
    location /admin/ {
        proxy_pass         http://127.0.0.1:9000/admin/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /packages {
        proxy_pass         http://127.0.0.1:9000/packages;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend FastAPI (/api/) ──────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Next.js Dashboard (semua route lain) ─────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
