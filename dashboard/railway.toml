# Railway config — Dashboard (Next.js)
# Service ini di-deploy dengan root directory: dashboard/
# Wajib set env var NEXT_PUBLIC_BACKEND_URL sebelum deploy.

[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build:railway"

[deploy]
startCommand = "HOSTNAME=0.0.0.0 node .next/standalone/server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on-failure"
restartPolicyMaxRetries = 5
