# Railway config — Backend (FastAPI)
# Service ini di-deploy dari ROOT direktori repo.
# Buat service kedua untuk dashboard dengan root directory: dashboard/

[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1 --loop asyncio"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on-failure"
restartPolicyMaxRetries = 5
